# PostgreSQL tuning for OpsLog workload
# Small-to-medium write-optimised event log

# Connection settings
listen_addresses = '*'
max_connections = 50

# Memory — tuned for a ~1-2 GB RAM container
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB
effective_cache_size = 256MB

# WAL — optimised for write throughput
wal_buffers = 8MB
checkpoint_completion_target = 0.9
max_wal_size = 512MB

# Logging
log_min_duration_statement = 500
log_statement = 'ddl'
log_timezone = 'UTC'
timezone = 'UTC'
