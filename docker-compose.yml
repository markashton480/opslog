version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opslog
      POSTGRES_PASSWORD: opslog
      POSTGRES_DB: opslog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - opslog_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opslog -d opslog"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8600:8600"
    environment:
      DATABASE_URL: postgresql+asyncpg://opslog:opslog@postgres:5432/opslog
      API_HOST: 0.0.0.0
      API_PORT: 8600
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - opslog_network
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8601:8601"
    depends_on:
      - api
    networks:
      - opslog_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  opslog_network:
    driver: bridge
