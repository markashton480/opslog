services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opslog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-opslog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/postgresql.conf:/etc/postgresql/custom.conf:ro
      - ./deploy/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    command: postgres -c config_file=/etc/postgresql/custom.conf
    networks:
      - opslog_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-opslog} -d $${POSTGRES_DB:-opslog}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-opslog}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-opslog}"
      API_HOST: "0.0.0.0"
      API_PORT: "8600"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - opslog_internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      args:
        VITE_OPSLOG_API_URL: ${VITE_OPSLOG_API_URL:-/api/v1}
        VITE_AUTH_MODE: ${VITE_AUTH_MODE:-oidc}
        VITE_OPSLOG_TOKEN: ${VITE_OPSLOG_TOKEN:-}
        VITE_OIDC_AUTHORITY: ${VITE_OIDC_AUTHORITY:-https://auth.lintel.digital/realms/lintel}
        VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID:-opslog}
        VITE_OIDC_REDIRECT_URI: ${VITE_OIDC_REDIRECT_URI:-https://opslog.lintel.digital/auth/callback}
        VITE_OIDC_POST_LOGOUT_REDIRECT_URI: ${VITE_OIDC_POST_LOGOUT_REDIRECT_URI:-https://opslog.lintel.digital/}
        VITE_OIDC_SCOPE: ${VITE_OIDC_SCOPE:-openid profile email}
        VITE_OIDC_SILENT_REDIRECT_URI: ${VITE_OIDC_SILENT_REDIRECT_URI:-}
    environment:
      OPSLOG_CSP_CONNECT_EXTRA: ${OPSLOG_CSP_CONNECT_EXTRA:-https://auth.lintel.digital}
      OPSLOG_CSP_FRAME_EXTRA: ${OPSLOG_CSP_FRAME_EXTRA:-https://auth.lintel.digital}
    ports:
      - "${LISTEN_ADDR:-127.0.0.1}:${DASHBOARD_PORT:-8601}:8601"
    depends_on:
      - api
    networks:
      - opslog_internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:

networks:
  opslog_internal:
    driver: bridge
