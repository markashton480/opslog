name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dashboard:
    name: Dashboard (typecheck, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx vite build

  api:
    name: API (lint, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: opslog
          POSTGRES_PASSWORD: opslog_ci
          POSTGRES_DB: opslog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opslog -d opslog"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -r pyproject.toml
          uv pip install --system pytest pytest-asyncio httpx ruff mypy

      - name: Lint
        run: ruff check app/

      - name: Test
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .
          DATABASE_URL: "postgresql://opslog:opslog_ci@localhost:5432/opslog"
          API_HOST: "127.0.0.1"
          API_PORT: "8600"

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f api/Dockerfile -t opslog-api:ci .

      - name: Build Dashboard image
        run: docker build -f dashboard/Dockerfile -t opslog-dashboard:ci .

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [dashboard, api]

    steps:
      - uses: actions/checkout@v4

      - name: Create CI .env
        run: |
          cat > .env << 'ENVEOF'
          POSTGRES_USER=opslog
          POSTGRES_PASSWORD=opslog_ci_e2e
          POSTGRES_DB=opslog
          API_HOST=0.0.0.0
          API_PORT=8600
          LOG_LEVEL=WARNING
          VITE_OPSLOG_API_URL=/api/v1
          VITE_AUTH_MODE=token
          VITE_OPSLOG_TOKEN=opslog_readonly_test
          LISTEN_ADDR=127.0.0.1
          DASHBOARD_PORT=8601
          ENVEOF
          sed -i 's/^ *//' .env

      - name: Start stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build --wait
          # Wait for API health
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8600/api/v1/health > /dev/null 2>&1; then
              echo "API healthy after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8600/api/v1/health
          curl -sf http://localhost:8601/ > /dev/null && echo "Dashboard OK"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browsers
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: dashboard
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8601
          PLAYWRIGHT_API_URL: http://localhost:8600
          PLAYWRIGHT_API_TOKEN: opslog_codex_b_test
          PLAYWRIGHT_ADMIN_TOKEN: opslog_mark_test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: dashboard/playwright-report/
          retention-days: 7

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
