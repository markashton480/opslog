services:
  postgres:
    environment:
      POSTGRES_PASSWORD: opslog

  api:
    volumes:
      - ./api/app:/app/app
      - ./api/migrations:/app/migrations
      - ./api/scripts:/app/scripts
    environment:
      DATABASE_URL: "postgresql+asyncpg://opslog:opslog@postgres:5432/opslog"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8600 --reload

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    volumes:
      - ./dashboard/src:/app/src
      - ./dashboard/tests:/app/tests
      - ./dashboard/index.html:/app/index.html
    ports:
      - "8601:8601"
    environment:
      VITE_OPSLOG_API_URL: http://host.docker.internal:8600/api/v1
