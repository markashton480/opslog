services:
  postgres:
    environment:
      POSTGRES_PASSWORD: opslog
    deploy:
      resources:
        limits:
          memory: 1G

  api:
    volumes:
      - ./api/app:/app/app
      - ./api/migrations:/app/migrations
      - ./api/scripts:/app/scripts
      - ./api/tests:/app/tests
    environment:
      DATABASE_URL: "postgresql+asyncpg://opslog:opslog@postgres:5432/opslog"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8600 --reload
    deploy:
      resources:
        limits:
          memory: 512M

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    volumes:
      - ./dashboard/src:/app/src
      - ./dashboard/tests:/app/tests
      - ./dashboard/index.html:/app/index.html
    environment:
      VITE_API_PROXY_TARGET: http://api:8600
      VITE_OPSLOG_TOKEN: opslog_readonly_test
    deploy:
      resources:
        limits:
          memory: 512M
